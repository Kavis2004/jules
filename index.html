<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Goat Picker</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">
    <div class="container mx-auto p-4 bg-white shadow-md rounded-lg max-w-lg text-center">
        <h1 class="text-3xl font-bold mb-6 text-indigo-600">Future Goat Picker</h1>

        <div class="mb-4">
            <label for="improvementArea" class="block text-gray-700 text-sm font-bold mb-2">What do you want to improve on?</label>
            <input type="text" id="improvementArea" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="e.g., 'public speaking', 'coding in Python'">
        </div>

        <button id="submitBtn" class="bg-indigo-500 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
            Get Suggestion
        </button>

        <div id="suggestionArea" class="mt-6 p-4 bg-indigo-50 border border-indigo-200 rounded-md min-h-[50px] text-gray-700">
            <!-- Suggestions will appear here -->
            <p class="text-gray-500 italic">Your personalized suggestion will appear here...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
